<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
<meta name="theme-color" content="#0e1e36" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Time Clock" />
<title>SSS Time Clock</title>
<link rel="manifest" href="timeclock.webmanifest" />
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
<link rel="icon" href="icons/favicon-64.png" sizes="64x64" type="image/png" />
<style>
  :root{
    --bg1:#0e1e36; --bg2:#17365d; --card:#363d47; --cardink:#e8edf2; --field:#272c34;
    --ink:#0e1e36; --muted:#9aa4b2;
    --line:#3a414c; --teal:#38bdb0; --green:#16a34a; --green2:#15803d;
    --red:#dc2626; --red2:#b91c1c; --amber:#d97706; --shadow:0 10px 30px rgba(0,0,0,.35);
  }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ margin:0; height:100%; }
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    color:var(--ink);
    background:linear-gradient(160deg,var(--bg1),var(--bg2));
    min-height:100dvh;
    display:flex; flex-direction:column; align-items:center;
    padding:max(16px,env(safe-area-inset-top)) 16px max(16px,env(safe-area-inset-bottom));
    overscroll-behavior:none;
  }
  .wrap{ width:100%; max-width:440px; margin:auto 0; }
  header{ text-align:center; color:#fff; margin:8px 0 14px; }
  header .logo{ width:64px; height:64px; border-radius:16px; box-shadow:var(--shadow); }
  header .logo-full{ width:330px; max-width:92%; height:auto; display:block; margin:0 auto 2px; filter:invert(1) drop-shadow(0 2px 6px rgba(0,0,0,.35)); }
  header h1{ font-size:15px; margin:6px 0 2px; letter-spacing:.6px; text-transform:uppercase; color:#cbd5e1; font-weight:700; }
  header .clock{ font-variant-numeric:tabular-nums; font-size:15px; color:#cbd5e1; }
  /* On-the-clock banner (running timer) */
  .onclock{ background:linear-gradient(180deg,var(--green),var(--green2)); color:#fff; border-radius:16px; padding:12px 14px 14px; text-align:center; margin-bottom:14px; box-shadow:var(--shadow); }
  .onclock .lbl{ font-size:13px; font-weight:600; opacity:.92; }
  .onclock .timer{ font-size:36px; font-weight:800; font-variant-numeric:tabular-nums; letter-spacing:1px; margin:2px 0 0; line-height:1.05; }
  .onclock .since{ font-size:12px; opacity:.9; margin-top:2px; }
  /* My Hours */
  .myhours-btn{ width:100%; margin-top:12px; border:none; background:#e5e7eb;
    color:#1e2530; font-size:15px; font-weight:700; padding:13px; border-radius:14px; cursor:pointer; }
  .myhours-btn:active{ background:#cbd0d8; }
  .ts-panel{ text-align:left; max-height:82vh; overflow-y:auto; }
  .ts-head{ display:flex; align-items:center; justify-content:space-between; gap:8px; margin-bottom:10px; }
  .ts-head .nav{ border:none; background:#f1f5f9; color:var(--ink); font-size:20px; width:40px; height:40px;
    border-radius:12px; cursor:pointer; flex:0 0 auto; }
  .ts-head .nav[disabled]{ opacity:.35; }
  .ts-head .wk{ text-align:center; flex:1; }
  .ts-head .wk .nm{ font-weight:800; font-size:16px; }
  .ts-head .wk .rng{ font-size:13px; color:var(--muted); }
  .ts-day{ display:flex; align-items:center; gap:8px; padding:9px 4px; border-bottom:1px solid var(--line); }
  .ts-day .dow{ flex:0 0 62px; font-weight:700; font-size:13px; }
  .ts-day .pun{ flex:1; font-size:12.5px; color:var(--muted); line-height:1.4; }
  .ts-day .hrs{ flex:0 0 auto; font-weight:800; font-variant-numeric:tabular-nums; }
  .ts-day.empty .hrs{ color:#5b6472; }
  .ts-total{ display:flex; justify-content:space-between; align-items:center; margin-top:12px;
    padding:12px 6px 4px; font-size:17px; font-weight:800; }
  .ts-total .big{ font-size:22px; color:var(--green2); }

  .card{ background:var(--card); color:var(--cardink); border-radius:22px; box-shadow:var(--shadow); padding:20px; }

  label{ display:block; font-size:13px; font-weight:600; color:var(--muted); margin:2px 2px 6px; }
  input[type=email]{
    width:100%; font-size:17px; padding:14px 14px; border:1.5px solid var(--line);
    border-radius:14px; outline:none; background:var(--field); color:var(--cardink);
  }
  input[type=email]::placeholder{ color:#6b7280; }
  input[type=email]:focus{ border-color:var(--teal); background:#232833; }

  /* PIN display */
  .pin-dots{ display:flex; justify-content:center; gap:14px; margin:14px 0 4px; height:20px; }
  .pin-dots .dot{ width:16px; height:16px; border-radius:50%; background:#3a414c; transition:transform .12s, background .12s; }
  .pin-dots .dot.on{ background:var(--cardink); transform:scale(1.05); }
  .hint{ text-align:center; font-size:13px; color:var(--muted); min-height:18px; margin-bottom:6px; }

  /* Keypad */
  .keys{ display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-top:6px; }
  .key{
    font-size:26px; font-weight:600; padding:16px 0; border-radius:16px; border:none;
    background:#f1f5f9; color:var(--ink); cursor:pointer; user-select:none;
    transition:transform .05s, background .1s;
  }
  .key:active{ transform:scale(.94); background:#e2e8f0; }
  .key.util{ font-size:16px; font-weight:600; color:var(--muted); background:transparent; }

  .actions{ display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:16px; }
  .btn{ border:none; border-radius:16px; padding:18px 10px; font-size:17px; font-weight:800;
    color:#fff; cursor:pointer; letter-spacing:.4px; box-shadow:var(--shadow);
    display:flex; align-items:center; justify-content:center; gap:8px; min-height:64px; }
  .btn:active{ transform:translateY(1px); }
  .btn[disabled]{ opacity:.5; cursor:default; box-shadow:none; }
  .btn.in{ background:linear-gradient(180deg,var(--green),var(--green2)); }
  .btn.out{ background:linear-gradient(180deg,var(--red),var(--red2)); }
  .btn .ico{ font-size:20px; }

  .foot{ text-align:center; color:#94a3b8; font-size:12px; margin-top:14px; line-height:1.5; }
  .foot a{ color:#cbd5e1; }
  .linkbtn{ background:none;border:none;color:#93c5fd;font-size:13px;cursor:pointer;text-decoration:underline;padding:6px; }

  /* shake on error */
  @keyframes shake{ 10%,90%{transform:translateX(-2px)} 30%,70%{transform:translateX(-6px)} 50%{transform:translateX(6px)} }
  .shake{ animation:shake .4s; }

  /* Overlay (busy / result) */
  .overlay{ position:fixed; inset:0; background:rgba(8,16,30,.72); backdrop-filter:blur(3px);
    display:none; align-items:center; justify-content:center; padding:24px; z-index:20; }
  .overlay.show{ display:flex; }
  .panel{ background:var(--card); color:var(--cardink); border-radius:22px; padding:26px 22px; width:100%; max-width:360px;
    text-align:center; box-shadow:var(--shadow); }
  .spinner{ width:46px; height:46px; border-radius:50%; border:5px solid #e2e8f0;
    border-top-color:var(--teal); margin:6px auto 16px; animation:spin 1s linear infinite; }
  @keyframes spin{ to{ transform:rotate(360deg) } }
  .big-ico{ font-size:60px; line-height:1; margin-bottom:6px; }
  .panel h2{ margin:6px 0 4px; font-size:22px; }
  .panel .who{ color:var(--muted); font-size:15px; }
  .panel .when{ font-size:30px; font-weight:800; margin:10px 0 2px; font-variant-numeric:tabular-nums; }
  .panel .meta{ color:var(--muted); font-size:13px; margin-top:6px; line-height:1.5; }
  .panel .meta.ok{ color:var(--green2); }
  .panel .meta.warn{ color:var(--amber); }
  .panel .meta.bad{ color:var(--red2); }
  .panel .done{ margin-top:18px; }
  .panel .done .btn{ box-shadow:none; }
  .btn.ghost{ background:#e5e7eb; color:#1e2530; }

  /* Setup notice when unconfigured */
  .setup{ background:#fff7ed; border:1px solid #fed7aa; color:#9a3412; border-radius:14px;
    padding:14px; font-size:13px; line-height:1.6; margin-bottom:14px; }
  .setup code{ background:#fde68a; padding:1px 5px; border-radius:5px; }

  /* "Signed in as" card (email remembered) */
  .signed{ display:flex; align-items:center; gap:12px; background:#434b57;
    border:1.5px solid var(--line); border-radius:16px; padding:12px 14px; }
  .signed .avatar{ width:40px; height:40px; border-radius:50%; flex:0 0 40px;
    background:var(--teal); color:#fff; font-size:20px; font-weight:700;
    display:flex; align-items:center; justify-content:center; }
  .signed .info{ flex:1; min-width:0; }
  .signed .lbl{ font-size:12px; color:var(--muted); font-weight:600; }
  .signed .addr{ font-size:16px; font-weight:700; color:var(--cardink);
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .signed .switch{ flex:0 0 auto; border:none; background:#e5e7eb;
    color:#1e2530; font-size:13px; font-weight:700; padding:9px 12px;
    border-radius:12px; cursor:pointer; }
  .signed .switch:active{ background:#cbd0d8; }

  .hidden{ display:none!important; }
</style>
</head>

      <!-- Running "on the clock" timer (shown while clocked in) -->
      <div id="onclock-banner" class="onclock hidden">
        <div class="lbl">⏱ You're on the clock</div>
        <div class="timer" id="onclock-timer">0:00:00</div>
        <div class="since" id="onclock-since"></div>
      </div>

      <div id="setup" class="setup hidden">
        <b>Setup needed.</b> Open <code>index.html</code> and set
        <code>BRIDGE_URL</code> near the top to your Apps Script Web App URL,
        then re-deploy. Employees never see this once it's set.
      </div>

      <!-- Email entry (shown when no email is remembered) -->
      <div id="email-row">
        <label for="email">Employee email</label>
        <input id="email" type="email" inputmode="email" autocomplete="username"
               autocapitalize="off" spellcheck="false" placeholder="you@company.com" />
      </div>

      <!-- Remembered email (shown for quick clock in/out) -->
      <div id="signed-row" class="signed hidden">
        <div class="avatar" id="signed-avatar">👤</div>
        <div class="info">
          <div class="lbl">Clocking as</div>
          <div class="addr" id="signed-addr">—</div>
        </div>
        <button class="switch" id="switch-user" type="button">Switch</button>
      </div>

      <div id="pin-row">
        <label id="pin-label">Enter PIN</label>
        <div class="pin-dots" id="dots"></div>
        <div class="hint" id="hint">Tap your code, then Clock In or Out</div>

        <div class="keys" id="keys">
          <button class="key" data-k="1">1</button>
          <button class="key" data-k="2">2</button>
          <button class="key" data-k="3">3</button>
          <button class="key" data-k="4">4</button>
          <button class="key" data-k="5">5</button>
          <button class="key" data-k="6">6</button>
          <button class="key" data-k="7">7</button>
          <button class="key" data-k="8">8</button>
          <button class="key" data-k="9">9</button>
          <button class="key util" data-k="clear">Clear</button>
          <button class="key" data-k="0">0</button>
          <button class="key util" data-k="back">⌫</button>
        </div>

        <div class="actions">
          <button class="btn in"  id="btn-in" disabled><span class="ico">▶</span> CLOCK IN</button>
          <button class="btn out" id="btn-out" disabled><span class="ico">■</span> CLOCK OUT</button>
        </div>
        <button type="button" class="myhours-btn" id="btn-myhours">📋 My Hours</button>
      </div>
    </div>

    <div class="foot">
      <div id="net-note"></div>
    </div>
  </div>

  <!-- Busy / result overlay -->
  <div class="overlay" id="overlay">
    <div class="panel" id="panel"></div>
  </div>

<script>
/* ============================================================
 *  CONFIG — set this once, before you deploy for your crew.
 *  Paste your Google Apps Script Web App URL between the quotes.
 *  (Same style of URL you use for Work Log Sync in Radio Tracker.)
 * ============================================================ */
const CONFIG = {
  BRIDGE_URL: "https://script.google.com/macros/s/AKfycbxKFowsxiD4_E4CIpXEBlOubE6RhqyjiHpbTQYZcg0johxA9FAyBkqgIrAiLhB5LMdMFQ/exec",
  COMPANY: "SSS Time Clock",      // shown in the header
  PIN_LENGTH: 4,                  // digits in an employee PIN (4–6)
  REQUIRE_LOCATION: true,         // if true, a denied/failed location asks for confirmation
  GEO_TIMEOUT_MS: 12000,
};

/* Allow a URL override for quick testing without editing the file:
   timeclock.html?url=<encoded exec url>  (stored locally after first use) */
(function(){
  try{
    const q = new URLSearchParams(location.search).get('url');
    if(q){ localStorage.setItem('tc_url_override', q); }
    const ov = localStorage.getItem('tc_url_override');
    if(ov && !CONFIG.BRIDGE_URL) CONFIG.BRIDGE_URL = ov;
  }catch(e){}
})();

const $ = (id)=>document.getElementById(id);
const state = { pin:"", busy:false };

/* ---------- device id ---------- */
function deviceId(){
  let d = localStorage.getItem('tc_device');
  if(!d){
    d = (crypto.randomUUID ? crypto.randomUUID()
        : 'dev-'+Math.random().toString(36).slice(2)+Date.now().toString(36));
    localStorage.setItem('tc_device', d);
  }
  return d;
}

/* ---------- live clock ---------- */
function tickClock(){
  const now = new Date();
  $('live-clock').textContent = now.toLocaleDateString(undefined,{weekday:'short',month:'short',day:'numeric'})
    + '  ·  ' + now.toLocaleTimeString(undefined,{hour:'numeric',minute:'2-digit',second:'2-digit'});
}

/* ---------- PIN entry ---------- */
function renderDots(){
  const wrap = $('dots'); wrap.innerHTML='';
  for(let i=0;i<CONFIG.PIN_LENGTH;i++){
    const d=document.createElement('div');
    d.className='dot'+(i<state.pin.length?' on':'');
    wrap.appendChild(d);
  }
}
function pushDigit(n){
  if(state.busy) return;
  if(state.pin.length>=CONFIG.PIN_LENGTH) return;
  state.pin += n; renderDots(); onCredsChange();
}
function backspace(){ if(state.busy) return; state.pin=state.pin.slice(0,-1); renderDots(); onCredsChange(); }
function clearPin(){ if(state.busy) return; state.pin=""; renderDots(); onCredsChange(); }
function resetPin(){ state.pin=""; renderDots(); onCredsChange(); }   // bypasses busy guard (used after a punch)

document.querySelectorAll('.key').forEach(k=>{
  k.addEventListener('click',()=>{
    const v=k.dataset.k;
    if(v==='back') backspace();
    else if(v==='clear') clearPin();
    else pushDigit(v);
  });
});

/* ---------- email remembering ----------
 * Two modes:
 *   • "remembered" — show a "Clocking as …" card + Switch button, hide the input.
 *     Day-to-day this means: open app → type PIN → tap. No email retyping.
 *   • "input"      — show the email field (first use, or after Switch on a
 *     borrowed phone). */
function currentEmail(){ return $('email').value.trim().toLowerCase(); }

function showEmailMode(mode){
  const remembered = (mode === 'remembered');
  $('signed-row').classList.toggle('hidden', !remembered);
  $('email-row').classList.toggle('hidden', remembered);
  if(remembered){
    const e = currentEmail();
    $('signed-addr').textContent = e;
    $('signed-avatar').textContent = (e[0] || '👤').toUpperCase();
  }
}

function loadEmail(){
  const e = (localStorage.getItem('tc_email') || '').trim().toLowerCase();
  $('email').value = e;
  showEmailMode(e ? 'remembered' : 'input');
  return e;
}
function saveEmail(){
  const e = currentEmail();
  if(e && e.includes('@')) localStorage.setItem('tc_email', e);
}
// Remember as soon as they finish typing (so it sticks even before the first punch).
$('email').addEventListener('blur', saveEmail);

// Switch employee — clears the saved email so a borrowed phone can be reused.
$('switch-user').addEventListener('click',()=>{
  localStorage.removeItem('tc_email');
  $('email').value=''; resetPin();
  showEmailMode('input');
  $('email').focus();
});

/* ---------- geolocation ---------- */
function getLocation(){
  return new Promise((resolve)=>{
    if(!('geolocation' in navigator)){ resolve({ok:false,reason:'unsupported'}); return; }
    navigator.geolocation.getCurrentPosition(
      (pos)=>resolve({ ok:true, lat:pos.coords.latitude, lng:pos.coords.longitude,
                       acc:Math.round(pos.coords.accuracy||0) }),
      (err)=>resolve({ ok:false, reason: err.code===1?'denied':(err.code===3?'timeout':'error') }),
      { enableHighAccuracy:true, timeout:CONFIG.GEO_TIMEOUT_MS, maximumAge:30000 }
    );
  });
}

/* ---------- overlay helpers ---------- */
function showBusy(msg){
  $('panel').innerHTML = `<div class="spinner"></div><h2 style="font-size:18px">${msg}</h2>`;
  $('overlay').classList.add('show');
}
function hideOverlay(){ $('overlay').classList.remove('show'); }

function showResult({icon,color,title,who,when,metaLines}){
  const meta = (metaLines||[]).map(m=>`<div class="meta ${m.cls||''}">${m.text}</div>`).join('');
  $('panel').innerHTML = `
    <div class="big-ico">${icon}</div>
    <h2 style="color:${color}">${title}</h2>
    ${who?`<div class="who">${who}</div>`:''}
    ${when?`<div class="when">${when}</div>`:''}
    ${meta}
    <div class="done"><button class="btn ghost" id="ov-done">Done</button></div>`;
  $('overlay').classList.add('show');
  $('ov-done').addEventListener('click',()=>{
    hideOverlay(); resetPin();
    if(localStorage.getItem('tc_email')) showEmailMode('remembered');
  });
}

function errorFlash(msg){
  $('hint').textContent = msg;
  $('hint').style.color = 'var(--red)';
  $('pin-row').classList.remove('shake'); void $('pin-row').offsetWidth;
  $('pin-row').classList.add('shake');
  setTimeout(()=>{ $('hint').style.color=''; }, 2500);
}

/* ---------- offline queue ---------- */
function queueGet(){ try{ return JSON.parse(localStorage.getItem('tc_queue')||'[]'); }catch(e){ return []; } }
function queueSet(q){ localStorage.setItem('tc_queue', JSON.stringify(q)); }
function queueAdd(p){ const q=queueGet(); q.push(p); queueSet(q); updateNetNote(); }

async function flushQueue(){
  let q = queueGet();
  if(!q.length) return;
  const remaining = [];
  for(const p of q){
    try{
      const res = await postClock(p);
      if(!(res && res.ok)) remaining.push(p);   // keep if server rejected transiently
    }catch(e){ remaining.push(p); }             // still offline
  }
  queueSet(remaining); updateNetNote();
}
function updateNetNote(){
  const n = queueGet().length;
  $('net-note').textContent = n ? `⏳ ${n} punch${n>1?'es':''} saved offline — will send when you have signal.` : '';
}

/* ---------- the network call (CORS-safe: text/plain, no preflight) ---------- */
async function postClock(payload){
  if(!CONFIG.BRIDGE_URL) throw new Error('not-configured');
  const res = await fetch(CONFIG.BRIDGE_URL, {
    method:'POST',
    headers:{ 'Content-Type':'text/plain;charset=utf-8' }, // simple request → no CORS preflight
    body: JSON.stringify(payload),
    redirect:'follow',
  });
  return res.json();
}

/* ---------- punch ---------- */
async function punch(type){
  if(state.busy) return;
  const email = $('email').value.trim().toLowerCase();
  if(!email || !email.includes('@')){ errorFlash('Enter your employee email'); $('email').focus(); return; }
  if(state.pin.length < CONFIG.PIN_LENGTH){ errorFlash(`Enter your ${CONFIG.PIN_LENGTH}-digit PIN`); return; }
  if(!CONFIG.BRIDGE_URL){ errorFlash('App not configured yet'); return; }

  state.busy = true;
  saveEmail();
  showBusy('Getting your location…');
  const loc = await getLocation();

  // If location required but unavailable, confirm before recording.
  if(CONFIG.REQUIRE_LOCATION && !loc.ok){
    const proceed = await confirmNoLocation(loc.reason);
    if(!proceed){ state.busy=false; hideOverlay(); return; }
  }

  const payload = {
    action:'clock',
    type,                                  // 'in' | 'out'
    email,
    pin: state.pin,
    lat: loc.ok?loc.lat:'', lng: loc.ok?loc.lng:'', acc: loc.ok?loc.acc:'',
    locStatus: loc.ok?'ok':(loc.reason||'unavailable'),
    clientTime: new Date().toISOString(),
    tzOffsetMin: new Date().getTimezoneOffset(),
    device: deviceId(),
    ua: navigator.userAgent,
  };

  showBusy('Recording your punch…');
  try{
    const res = await postClock(payload);
    handleServerResult(type, res, loc);
  }catch(err){
    // Network failure → queue and reassure. Reflect the punch on the timer now
    // (start on 'in', clear on 'out') even though it's only queued, and cancel
    // any in-flight status check so it can't fight the local state.
    queueAdd(payload);
    _statusToken++;
    setClockTimer(type, payload.clientTime);
    showResult({
      icon:'📶', color:'var(--amber)',
      title:'Saved — no signal',
      who:`Clock ${type==='in'?'in':'out'} recorded on your phone`,
      when: fmtTime(payload.clientTime),
      metaLines:[{cls:'warn', text:'It will be sent automatically when you get signal. You can close the app.'}]
    });
  }finally{
    state.busy = false;
  }
}

/* ---------- My Hours (weekly timesheet) ---------- */
function _esc(s){ return String(s==null?'':s).replace(/[&<>]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
function _ymd(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function _mondayYmd(d){ d=d||new Date(); const dow=(d.getDay()+6)%7; return _ymd(new Date(d.getFullYear(),d.getMonth(),d.getDate()-dow)); }
function _addDaysYmd(ymd,n){ const p=ymd.split('-'); const d=new Date(+p[0],+p[1]-1,+p[2]); d.setDate(d.getDate()+n); return _ymd(d); }

async function showTimesheet(){
  const email=$('email').value.trim().toLowerCase();
  if(!email || !email.includes('@') || state.pin.length<CONFIG.PIN_LENGTH){ errorFlash('Enter your email and PIN first'); return; }
  await fetchHistory(null);   // null = current week
}
async function fetchHistory(weekStart){
  const email=$('email').value.trim().toLowerCase();
  const pin=state.pin;
  showBusy('Loading your hours…');
  try{
    const res=await fetch(CONFIG.BRIDGE_URL,{ method:'POST', headers:{'Content-Type':'text/plain;charset=utf-8'},
      body: JSON.stringify({ action:'history', email, pin, weekStart }), redirect:'follow' });
    const data=await res.json();
    if(data && data.ok){ renderTimesheet(data); }
    else if(data && data.code==='AUTH'){ hideOverlay(); errorFlash('Wrong email or PIN'); }
    else { errorish((data && data.error) || 'Could not load your hours.'); }
  }catch(e){ errorish("Offline — can't load hours right now."); }
}
function renderTimesheet(data){
  const isCurrent = data.weekStart >= _mondayYmd(new Date());
  const rows=data.days.map(d=>{
    const punch = d.punches.length ? d.punches.map(p=>(p.action==='in'?'In ':'Out ')+p.time).join(' · ') : '—';
    return '<div class="ts-day'+(d.punches.length?'':' empty')+'">'
      + '<div class="dow">'+_esc(d.label)+'</div>'
      + '<div class="pun">'+_esc(punch)+'</div>'
      + '<div class="hrs">'+(d.hours?d.hours+'h':'—')+'</div></div>';
  }).join('');
  $('panel').innerHTML =
    '<div class="ts-panel">'
    + '<div class="ts-head">'
    +   '<button class="nav" id="ts-prev">◀</button>'
    +   '<div class="wk"><div class="nm">'+_esc(data.name)+'</div><div class="rng">'+_esc(data.weekLabel)+(isCurrent?' · this week':'')+'</div></div>'
    +   '<button class="nav" id="ts-next"'+(isCurrent?' disabled':'')+'>▶</button>'
    + '</div>'
    + rows
    + '<div class="ts-total"><span>Week total</span><span class="big">'+data.totalHours+' h</span></div>'
    + '<div class="done"><button class="btn ghost" id="ts-done">Done</button></div>'
    + '</div>';
  $('overlay').classList.add('show');
  $('ts-prev').addEventListener('click',()=>fetchHistory(_addDaysYmd(data.weekStart,-7)));
  const nx=$('ts-next'); if(nx && !nx.disabled) nx.addEventListener('click',()=>fetchHistory(_addDaysYmd(data.weekStart,7)));
  $('ts-done').addEventListener('click',()=>{ hideOverlay(); });
}
$('btn-myhours').addEventListener('click', showTimesheet);

/* ---------- "on the clock" running timer ---------- */
let _onclockTimer = null;
function _fmtDur(ms){ if(ms<0)ms=0; const s=Math.floor(ms/1000), h=Math.floor(s/3600), m=Math.floor((s%3600)/60), sec=s%60; return h+':'+String(m).padStart(2,'0')+':'+String(sec).padStart(2,'0'); }
function _parseClockStart(dateStr, timeStr){
  try{
    const p=String(dateStr||'').split('/'); if(p.length!==3) return null;
    const mo=+p[0], d=+p[1], y=+p[2];
    const m=/^(\d+):(\d+)\s*(AM|PM)?/i.exec(String(timeStr||'').trim()); if(!m) return null;
    let hh=+m[1]; const mm=+m[2]; const ap=(m[3]||'').toUpperCase();
    if(ap==='PM'&&hh!==12)hh+=12; if(ap==='AM'&&hh===12)hh=0;
    const t=new Date(y,mo-1,d,hh,mm,0).getTime(); return isNaN(t)?null:t;
  }catch(e){ return null; }
}
function showOnClock(startMs){
  const b=$('onclock-banner'); if(!b||!startMs) return;
  b.classList.remove('hidden');
  const since=$('onclock-since'); if(since){ since.textContent='Clocked in at '+new Date(startMs).toLocaleTimeString(undefined,{hour:'numeric',minute:'2-digit'}); }
  if(_onclockTimer) clearInterval(_onclockTimer);
  const tick=()=>{ const t=$('onclock-timer'); if(t) t.textContent=_fmtDur(Date.now()-startMs); };
  tick(); _onclockTimer=setInterval(tick,1000);
}
function hideOnClock(){ const b=$('onclock-banner'); if(b) b.classList.add('hidden'); if(_onclockTimer){ clearInterval(_onclockTimer); _onclockTimer=null; } }
// Set the on-clock timer to match a punch (used by both the online result and the
// offline-queue path). 'in' starts it, 'out' clears it.
function setClockTimer(type, atISO){
  if(type==='in'){
    const iso = atISO || new Date().toISOString();
    localStorage.setItem('tc_clockin', JSON.stringify({ at:iso, email:$('email').value.trim().toLowerCase() }));
    showOnClock(new Date(iso).getTime());
  } else {
    localStorage.removeItem('tc_clockin');
    hideOnClock();
  }
}
function loadOnClock(){
  try{ const c=JSON.parse(localStorage.getItem('tc_clockin')||'null'); if(c&&c.at){ const ms=new Date(c.at).getTime(); if(!isNaN(ms)){ showOnClock(ms); return; } } }catch(e){}
  hideOnClock();
}
// Keep the banner in sync with the server's known status (handles other-device / reinstall).
function syncOnClockWithStatus(data){
  if(data && data.last==='in'){
    let c=null; try{ c=JSON.parse(localStorage.getItem('tc_clockin')||'null'); }catch(e){}
    let startMs=(c&&c.at)?new Date(c.at).getTime():NaN;
    if(isNaN(startMs)){ startMs=_parseClockStart(data.date,data.at); if(startMs) localStorage.setItem('tc_clockin', JSON.stringify({at:new Date(startMs).toISOString(), email:$('email').value.trim().toLowerCase()})); }
    if(startMs) showOnClock(startMs);
  }else{ localStorage.removeItem('tc_clockin'); hideOnClock(); }
}

function handleServerResult(type, res, loc){
  if(!res){ errorish('No response from server. Try again.'); return; }
  if(res.ok){
    // A punch is the freshest truth — cancel any in-flight status check so a
    // stale "you're clocked in" reply can't re-show the timer after a clock-out.
    _statusToken++;
    state.status = type; state.statusAt = fmtTime(res.at || new Date().toISOString());
    // Start / stop the running "on the clock" timer.
    setClockTimer(type, res.at);
    const locLine = loc.ok
      ? { cls:'ok', text:`📍 Location captured (±${loc.acc} m)` }
      : { cls:'warn', text:'📍 Location not available' };
    showResult({
      icon: type==='in'?'✅':'👋',
      color: type==='in'?'var(--green2)':'var(--red2)',
      title: type==='in'?'Clocked IN':'Clocked OUT',
      who: res.name ? res.name : '',
      when: fmtTime(res.at || new Date().toISOString()),
      metaLines: [ locLine ].concat(res.note?[{text:res.note}]:[])
    });
    return;
  }
  // Server said no.
  if(res.code === 'DUP'){
    showResult({
      icon:'⚠️', color:'var(--amber)',
      title: type==='in'?'Already clocked in':'Already clocked out',
      who: res.name||'',
      when: res.last?fmtTime(res.last):'',
      metaLines:[{cls:'warn', text: res.error || 'Your last punch was the same type.'}]
    });
    return;
  }
  if(res.code === 'AUTH'){ hideOverlay(); errorFlash('Wrong email or PIN'); resetPin(); return; }
  errorish(res.error || 'Could not record punch.');
}

function errorish(msg){
  showResult({ icon:'⚠️', color:'var(--red2)', title:'Something went wrong',
    metaLines:[{cls:'bad', text:msg}] });
}

function fmtTime(iso){
  const d = new Date(iso);
  if(isNaN(d)) return '';
  return d.toLocaleTimeString(undefined,{hour:'numeric',minute:'2-digit'})
       + '  ·  ' + d.toLocaleDateString(undefined,{month:'short',day:'numeric'});
}

/* location-denied confirmation */
function confirmNoLocation(reason){
  return new Promise((resolve)=>{
    const why = reason==='denied'
      ? 'Location permission is off. Your punch will be recorded without a location.'
      : 'Could not get your location. Your punch will be recorded without a location.';
    $('panel').innerHTML = `
      <div class="big-ico">📍</div>
      <h2 style="font-size:19px">No location</h2>
      <div class="meta warn" style="margin:8px 0 16px">${why}</div>
      <div class="actions" style="margin-top:0">
        <button class="btn ghost" id="loc-cancel" style="background:#64748b">Cancel</button>
        <button class="btn ghost" id="loc-ok">Continue</button>
      </div>`;
    $('overlay').classList.add('show');
    $('loc-ok').addEventListener('click',()=>resolve(true));
    $('loc-cancel').addEventListener('click',()=>resolve(false));
  });
}

/* ---------- button state: grey until email+PIN, then light the right one ----------
   Buttons stay greyed with "Enter your email and PIN" until a valid email + full
   PIN are entered. Then we ask the server for the employee's current status and
   light ONLY the correct button: Clock In if they're off, Clock Out if they're on.
   After a punch, everything greys out again. */
let _statusToken = 0, _lastCheckedKey = '';

function applyButtons(){
  if(state.busy) return;                        // overlay is up during a punch
  const email  = $('email').value.trim().toLowerCase();
  const pinFull = state.pin.length >= CONFIG.PIN_LENGTH;
  const inBtn = $('btn-in'), outBtn = $('btn-out'), hint = $('hint');
  const set = (btn,on)=>{ btn.disabled = !on; };
  hint.style.color = '';
  if(!email || !email.includes('@') || !pinFull){
    set(inBtn,false); set(outBtn,false);
    hint.textContent = 'Enter your email and PIN';
    return;
  }
  switch(state.status){
    case 'checking':
      set(inBtn,false); set(outBtn,false); hint.textContent = 'Checking…'; break;
    case 'in':
      set(inBtn,false); set(outBtn,true);
      hint.innerHTML = 'Clocked in'+(state.statusAt?' since '+state.statusAt:'')+' — tap <b>Clock Out</b>'; break;
    case 'out': case 'none':
      set(inBtn,true); set(outBtn,false);
      hint.innerHTML = (state.status==='out'&&state.statusAt?'Last out '+state.statusAt+' · ':'')+'tap <b>Clock In</b>'; break;
    case 'auth':
      set(inBtn,false); set(outBtn,false);
      hint.textContent = 'Wrong email or PIN'; hint.style.color = 'var(--red)'; break;
    default: // offline / error / unknown → let them punch; server dup-guard protects
      set(inBtn,true); set(outBtn,true);
      hint.textContent = 'Tap Clock In or Clock Out';
  }
}

async function checkStatus(){
  const email = $('email').value.trim().toLowerCase();
  const pin = state.pin;
  const token = ++_statusToken;
  state.status = 'checking'; applyButtons();
  try{
    const res = await fetch(CONFIG.BRIDGE_URL, {
      method:'POST', headers:{'Content-Type':'text/plain;charset=utf-8'},
      body: JSON.stringify({ action:'status', email, pin }), redirect:'follow',
    });
    const data = await res.json();
    if(token !== _statusToken) return;          // superseded by a newer PIN
    if(data && data.ok){ state.status = data.last; state.statusAt = data.at; state.statusName = data.name; syncOnClockWithStatus(data); }
    else if(data && data.code === 'AUTH'){ state.status = 'auth'; }
    else { state.status = 'error'; }
  }catch(e){
    if(token !== _statusToken) return;
    state.status = 'offline';
  }
  applyButtons();
}

function onCredsChange(){
  const email = $('email').value.trim().toLowerCase();
  const pinFull = state.pin.length >= CONFIG.PIN_LENGTH;
  if(email && email.includes('@') && pinFull){
    const key = email + '|' + state.pin;
    if(_lastCheckedKey !== key){ _lastCheckedKey = key; checkStatus(); }
    else { applyButtons(); }
  }else{
    state.status = null; _lastCheckedKey = ''; _statusToken++;   // cancel any in-flight check
    applyButtons();
  }
}

$('email').addEventListener('input', onCredsChange);
$('btn-in').addEventListener('click', ()=>punch('in'));
$('btn-out').addEventListener('click', ()=>punch('out'));

/* ---------- boot ---------- */
function boot(){
  $('company').textContent = 'Time Clock';   // logo shows the brand; this is the subtitle
  document.title = CONFIG.COMPANY;
  tickClock(); setInterval(tickClock, 1000);
  renderDots();
  const e = loadEmail();
  if(!CONFIG.BRIDGE_URL) $('setup').classList.remove('hidden');
  if(!e) setTimeout(()=>$('email').focus(), 300);
  updateNetNote();
  applyButtons();          // start greyed with "Enter your email and PIN"
  loadOnClock();           // restore the running timer if they're still clocked in
  flushQueue();

  if('serviceWorker' in navigator){
    navigator.serviceWorker.register('timeclock-sw.js').catch(()=>{});
  }
  window.addEventListener('online', flushQueue);
  document.addEventListener('visibilitychange', ()=>{ if(!document.hidden) flushQueue(); });
}
boot();
</script>
</body>
</html>
